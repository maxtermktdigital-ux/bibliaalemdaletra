---
layout: default
title: "Pesquisar Estudos"
---

<div class="search-page-container" style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    <header class="search-page-header" style="text-align: center; margin-bottom: 40px;">
        <h2 style="font-family: var(--font-heading); font-size: 2rem; color: var(--text-main);">O que você está buscando?</h2>
        <p style="color: var(--text-muted);">Digite palavras-chave, livros bíblicos ou temas dos estudos.</p>
    </header>

    <div class="search-input-wrapper" style="position: relative; margin-bottom: 40px;">
        <input type="text" id="search-input" placeholder="Ex: Jeremias, Oração, Fé..." autocomplete="off" style="width: 100%; padding: 15px 20px; font-size: 1.1rem; border: 2px solid var(--border-color); border-radius: 8px; background-color: var(--bg-surface); color: var(--text-main); outline: none; transition: border-color 0.3s ease;">
    </div>

    <div id="search-meta" style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 20px; display: none;"></div>

    <div id="search-results" class="search-results-list" style="display: flex; flex-direction: column; gap: 20px;">
        </div>
</div>

<style>
    #search-input:focus {
        border-color: var(--color-primary-gold) !important;
        box-shadow: 0 0 0 3px rgba(245, 166, 70, 0.1);
    }
    .search-result-item {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 20px;
        transition: transform 0.2s ease;
    }
    .search-result-item:hover {
        transform: translateX(5px);
        border-color: var(--color-primary-gold);
    }
</style>
